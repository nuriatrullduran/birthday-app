<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#ffffff">
    <title>Birthdays</title>
    <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
    <link rel="icon" href="icon-180.png">
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --navy: #1e3a5f;
            --navy-light: #2a4d7a;
            --family: #7c5cbf;
            --uni: #e8a838;
            --school: #5aab7a;
            --lux: #5ba4cf;
            --indy: #cf5b5b;
            --other: #8e8e93;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', system-ui, sans-serif;
            background: #ffffff;
            color: #1c1c1e;
            min-height: 100vh;
            max-width: 430px;
            margin: 0 auto;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            display: block;
            height: env(safe-area-inset-top, 0px);
            background: #ffffff;
        }


        /* Year view */
        .year-view {
            padding: 20px 16px;
            min-height: 100vh;
        }

        .year-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 0 4px;
        }

        .year-title {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--navy);
        }

        .months-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .month-card {
            background: #f8f8fa;
            border-radius: 12px;
            padding: 16px 12px;
            text-align: center;
            cursor: pointer;
            transition: background 0.1s;
        }

        .month-card:active {
            background: #e5e5ea;
        }

        .month-card .month-name {
            font-size: 0.85rem;
            font-weight: 600;
            color: #1c1c1e;
        }


        .month-card.current {
            border: 1.5px solid var(--navy);
        }

        /* Coming up */
        .coming-up-section {
            margin-top: 28px;
        }

        .coming-up-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: #8e8e93;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .coming-up-card {
            background: #f8f8fa;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .coming-up-card .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.8rem;
            color: #ffffff;
        }

        .coming-up-card .info {
            flex: 1;
        }

        .coming-up-card .name {
            font-weight: 600;
            font-size: 0.85rem;
        }

        .coming-up-card .detail {
            font-size: 0.7rem;
            color: #8e8e93;
            margin-top: 2px;
        }

        .coming-up-card .days-left {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--navy);
        }

        /* Calendar */
        .calendar-view {
            display: none;
            position: fixed;
            inset: 0;
            background: #ffffff;
            z-index: 100;
            flex-direction: column;
            padding-top: env(safe-area-inset-top, 16px);
            overflow-y: auto;
        }

        .calendar-view.active {
            display: flex;
        }

        .calendar-section {
            background: #ffffff;
            margin: 0;
            border-radius: 0;
            padding: 8px 14px;
            display: flex;
            flex-direction: column;
        }

        .calendar-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            padding: 0 10px;
        }

        .nav-list-btn {
            background: none;
            border: none;
            font-size: 1.4rem;
            color: var(--navy);
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 8px;
        }

        .nav-list-btn:active {
            background: #f2f2f7;
        }

        /* All events screen */
        .all-events-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: #ffffff;
            z-index: 350;
            flex-direction: column;
            padding-top: env(safe-area-inset-top, 16px);
        }

        .all-events-overlay.active {
            display: flex;
        }

        .all-events {
            flex: 1;
            width: 100%;
            max-width: 430px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .all-events-header {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 0.5px solid #e5e5ea;
        }

        .all-events-header button {
            background: none;
            border: none;
            font-size: 1.5rem;
            font-weight: 500;
            color: var(--navy);
            cursor: pointer;
            margin-right: 16px;
        }

        .all-events-header h3 {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--navy);
        }

        .all-events-search {
            padding: 10px 20px;
        }

        .all-events-search input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: none;
            background: #f2f2f7;
            font-size: 0.85rem;
            font-family: inherit;
            outline: none;
            color: #1c1c1e;
        }

        .all-events-search input::placeholder {
            color: #8e8e93;
        }

        .all-events-filter {
            display: flex;
            gap: 8px;
            padding: 12px 20px;
            overflow-x: auto;
            border-bottom: 0.5px solid #e5e5ea;
        }

        .all-events-filter::-webkit-scrollbar { display: none; }

        .all-events-filter .filter-chip {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            border: 1.5px solid #e5e5ea;
            color: #8e8e93;
            background: #ffffff;
            transition: all 0.2s;
        }

        .all-events-filter .filter-chip.active {
            border-color: transparent;
            color: #ffffff;
        }

        .all-events-filter .filter-chip.active[data-group="all"] { background: var(--navy); border-color: var(--navy); }
        .all-events-filter .filter-chip.active[data-group="family"] { background: var(--family); }
        .all-events-filter .filter-chip.active[data-group="uni"] { background: var(--uni); }
        .all-events-filter .filter-chip.active[data-group="school"] { background: var(--school); }
        .all-events-filter .filter-chip.active[data-group="lux"] { background: var(--lux); }
        .all-events-filter .filter-chip.active[data-group="indy"] { background: var(--indy); }
        .all-events-filter .filter-chip.active[data-group="other"] { background: var(--other); }

        .all-events-list {
            padding: 16px 20px;
            flex: 1;
            overflow-y: auto;
        }

        .all-events-group-title {
            font-size: 0.7rem;
            font-weight: 600;
            color: #8e8e93;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            margin-top: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .all-events-group-title:first-child {
            margin-top: 0;
        }

        .all-events-group-title .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .all-events-card {
            background: #f2f2f7;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
        }

        .all-events-card:active {
            background: #e5e5ea;
        }

        .all-events-card .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.9rem;
            color: #ffffff;
        }

        .all-events-card .info {
            flex: 1;
        }

        .all-events-card .name {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .all-events-card .detail {
            font-size: 0.75rem;
            color: #8e8e93;
            margin-top: 2px;
        }

        .calendar-nav button {
            background: none;
            border: none;
            font-size: 1.8rem;
            color: var(--navy);
            cursor: pointer;
            padding: 8px 14px;
            border-radius: 8px;
            font-weight: 500;
        }

        .calendar-nav button:active {
            background: #f2f2f7;
        }

        .calendar-nav .month-year {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--navy);
        }

        .calendar-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            margin-bottom: 8px;
            padding-bottom: 8px;
        }

        .calendar-weekdays span {
            font-size: 0.75rem;
            font-weight: 600;
            color: #8e8e93;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            align-content: start;
        }

        .calendar-day {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 8px 0 6px;
            min-height: 70px;
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            transition: background 0.1s;
        }

        .calendar-day:active {
            background: #f2f2f7;
        }

        .calendar-day.selected {
            background: #eef2f7;
            border-radius: 10px;
        }

        .calendar-day .day-number {
            font-size: 0.9rem;
            font-weight: 400;
            color: #1c1c1e;
            margin-bottom: 4px;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .calendar-day.today .day-number {
            font-weight: 600;
            background: var(--navy);
            color: #ffffff;
        }

        .calendar-day.other-month .day-number {
            color: #d1d1d6;
        }

        .calendar-day .avatars-stack {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .calendar-day .mini-avatar {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.55rem;
            font-weight: 700;
            color: #ffffff;
            border: 2px solid #ffffff;
        }

        .calendar-day .mini-avatar + .mini-avatar {
            margin-left: -9px;
        }

        .calendar-day .age-label {
            font-size: 0.55rem;
            color: #8e8e93;
            margin-top: 2px;
            font-weight: 500;
        }

        /* Day entries below calendar */
        .day-entries {
            padding: 12px 16px;
            overflow-y: auto;
            border-top: 0.5px solid #e5e5ea;
        }

        .day-entries-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--navy);
            margin-bottom: 10px;
        }

        .day-entries-empty {
            font-size: 0.8rem;
            color: #8e8e93;
            padding: 8px 0;
        }

        .day-entry-card {
            background: #f8f8fa;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .day-entry-card:active {
            background: #e5e5ea;
        }

        .day-entry-card .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.8rem;
            color: #ffffff;
        }

        .day-entry-card .info {
            flex: 1;
        }

        .day-entry-card .name {
            font-weight: 600;
            font-size: 0.85rem;
        }

        .day-entry-card .detail {
            font-size: 0.7rem;
            color: #8e8e93;
            margin-top: 2px;
        }

        .day-entry-card .age-badge {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--navy);
        }

        /* FAB */
        .fab {
            position: fixed;
            bottom: 40px;
            right: calc(50% - 195px);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--navy);
            color: white;
            border: none;
            font-size: 1.5rem;
            font-weight: 300;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(30, 58, 95, 0.3);
            z-index: 200;
        }

        @media (max-width: 430px) {
            .fab {
                right: 24px;
            }
        }

        .fab:active {
            transform: scale(0.92);
        }

        .fab-month {
            display: none;
        }

        .fab-month.visible {
            display: flex;
        }


        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 500;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(2px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #f2f2f7;
            border-radius: 14px;
            width: calc(100% - 32px);
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            padding-bottom: 30px;
        }

        .modal-handle {
            width: 36px;
            height: 5px;
            background: #c7c7cc;
            border-radius: 3px;
            margin: 10px auto 0;
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
        }

        .modal-header .cancel {
            color: var(--navy-light);
            font-size: 0.9rem;
            background: none;
            border: none;
            cursor: pointer;
        }

        .modal-header h2 {
            font-size: 1rem;
            font-weight: 600;
        }

        .modal-header .save {
            color: var(--navy);
            font-size: 0.9rem;
            font-weight: 600;
            background: none;
            border: none;
            cursor: pointer;
        }

        .form-section {
            background: #ffffff;
            margin: 0 20px;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .form-row {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            border-bottom: 0.5px solid #e5e5ea;
        }

        .form-row:last-child {
            border-bottom: none;
        }

        .form-row label {
            font-size: 0.9rem;
            width: 60px;
            flex-shrink: 0;
        }

        .form-row input {
            flex: 1;
            border: none;
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            background: transparent;
            color: #1c1c1e;
        }

        .form-row input::placeholder {
            color: #c7c7cc;
        }

        .type-selector {
            display: flex;
            gap: 8px;
            flex: 1;
        }

        .type-option {
            flex: 1;
            padding: 8px 6px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            border: 1.5px solid #e5e5ea;
            color: #8e8e93;
            transition: all 0.2s;
        }

        .type-option.selected {
            background: var(--navy);
            color: #ffffff;
            border-color: transparent;
        }

        .group-display {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            font-size: 0.9rem;
            color: #1c1c1e;
        }

        .group-display .group-color-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 10px;
        }

        .group-display .group-text {
            flex: 1;
        }

        .group-display .chevron {
            color: #c7c7cc;
            font-size: 1rem;
        }

        /* iOS Picker */
        .picker-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 600;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(2px);
        }

        .picker-overlay.active {
            display: flex;
        }

        .picker {
            background: #ffffff;
            border-radius: 14px;
            width: 220px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }


        .picker-options {
            max-height: 240px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 6px 0;
        }

        .picker-option {
            padding: 10px 14px;
            font-size: 0.82rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 0.5px solid #f2f2f7;
        }

        .picker-option:last-child {
            border-bottom: none;
        }

        .picker-option:active {
            background: #f2f2f7;
        }

        .picker-option.selected {
            color: var(--navy);
            font-weight: 600;
        }

        .picker-option .check {
            margin-left: auto;
            color: var(--navy);
            font-weight: 700;
            opacity: 0;
            font-size: 0.8rem;
        }

        .picker-option.selected .check {
            opacity: 1;
        }

        .picker-option .option-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }


        /* Date inputs */
        .date-inputs {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .date-field {
            width: 32px;
            border: none;
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            background: transparent;
            color: #1c1c1e;
            text-align: center;
            padding: 0;
        }

        .date-field-year {
            width: 46px;
        }

        .date-field::placeholder {
            color: #c7c7cc;
        }

        .date-sep {
            color: #8e8e93;
            font-size: 0.9rem;
        }

        .btn-delete-section {
            background: #ffffff;
            margin: 0 20px;
            border-radius: 12px;
            overflow: hidden;
        }

        .btn-delete {
            width: 100%;
            padding: 14px;
            background: none;
            border: none;
            color: #ff3b30;
            font-size: 0.9rem;
            font-family: inherit;
            cursor: pointer;
            text-align: center;
        }

        .btn-delete:active {
            background: #f2f2f7;
        }

    </style>
</head>
<body>


    <!-- Year View (main screen) -->
    <div class="year-view" id="year-view">
        <div class="year-header">
            <div class="year-title">2026</div>
            <button class="nav-list-btn" id="open-all-events-year">☰</button>
        </div>
        <div class="months-grid" id="months-grid"></div>
        <div class="coming-up-section" id="coming-up-section"></div>
    </div>

    <!-- Calendar View (month screen) -->
    <div class="calendar-view" id="calendar-view">
        <div class="calendar-section">
            <div class="calendar-nav">
                <button id="back-to-year" style="font-size:1.6rem; color:#8e8e93; padding:8px 14px;">‹</button>
                <button id="prev-month">‹</button>
                <span class="month-year" id="month-year"></span>
                <button id="next-month">›</button>
                <button class="nav-list-btn" id="open-all-events">☰</button>
            </div>
            <div class="calendar-weekdays">
                <span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
            </div>
            <div class="calendar-days" id="calendar-days"></div>
        </div>
        <div class="day-entries" id="day-entries"></div>
    </div>

    <!-- All Events -->
    <div class="all-events-overlay" id="all-events-overlay">
        <div class="all-events">
            <div class="all-events-header">
                <button id="all-events-close">‹</button>
                <h3>All Events</h3>
            </div>
            <div class="all-events-search">
                <input type="text" id="all-events-search-input" placeholder="Search by name...">
            </div>
            <div class="all-events-filter" id="all-events-filter">
                <div class="filter-chip active" data-group="all">All</div>
                <div class="filter-chip" data-group="family">Family</div>
                <div class="filter-chip" data-group="uni">Uni</div>
                <div class="filter-chip" data-group="school">School</div>
                <div class="filter-chip" data-group="lux">Lux</div>
                <div class="filter-chip" data-group="indy">Indy</div>
                <div class="filter-chip" data-group="other">Other</div>
            </div>
            <div class="all-events-list" id="all-events-list"></div>
        </div>
    </div>

    <!-- FAB (only shows in month view) -->
    <button class="fab fab-month" id="fab-add">+</button>

    <!-- Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <div class="modal-handle"></div>
            <div class="modal-header">
                <button class="cancel" id="btn-cancel">Cancel</button>
                <h2 id="modal-title">New Event</h2>
                <button class="save" id="btn-save">Save</button>
            </div>
            <div class="form-section">
                <div class="form-row">
                    <label>Name</label>
                    <input type="text" id="input-name" placeholder="Friend's name">
                </div>
                <div class="form-row">
                    <label>Date</label>
                    <div class="date-inputs">
                        <input type="text" id="input-day" placeholder="DD" maxlength="2" inputmode="numeric" class="date-field">
                        <span class="date-sep">/</span>
                        <input type="text" id="input-month" placeholder="MM" maxlength="2" inputmode="numeric" class="date-field">
                        <span class="date-sep" id="year-sep">/</span>
                        <input type="text" id="input-year" placeholder="YYYY" maxlength="4" inputmode="numeric" class="date-field date-field-year">
                    </div>
                    <input type="hidden" id="input-date">
                </div>
                <div class="form-row">
                    <label>Type</label>
                    <div class="type-selector">
                        <div class="type-option selected" data-value="birthday">Birthday</div>
                        <div class="type-option" data-value="sant">Sant</div>
                    </div>
                </div>
                <div class="form-row" id="group-row">
                    <label>Group</label>
                    <div class="group-display" id="group-display">
                        <div class="group-color-dot" id="group-dot" style="background:var(--other)"></div>
                        <span class="group-text" id="group-text">Other</span>
                        <span class="chevron">›</span>
                    </div>
                </div>
            </div>
            <div class="btn-delete-section" id="delete-section" style="display:none">
                <button class="btn-delete" id="btn-delete">Delete Event</button>
            </div>
        </div>
    </div>

    <!-- Day Detail -->

    <!-- Group Picker -->
    <div class="picker-overlay" id="picker-overlay">
        <div class="picker">
            <div class="picker-options" id="picker-options">
                <div class="picker-option selected" data-value="family">
                    <div class="option-dot" style="background:var(--family)"></div>
                    Family
                    <span class="check">✓</span>
                </div>
                <div class="picker-option" data-value="uni">
                    <div class="option-dot" style="background:var(--uni)"></div>
                    Uni
                    <span class="check">✓</span>
                </div>
                <div class="picker-option" data-value="school">
                    <div class="option-dot" style="background:var(--school)"></div>
                    School
                    <span class="check">✓</span>
                </div>
                <div class="picker-option" data-value="lux">
                    <div class="option-dot" style="background:var(--lux)"></div>
                    Lux
                    <span class="check">✓</span>
                </div>
                <div class="picker-option" data-value="indy">
                    <div class="option-dot" style="background:var(--indy)"></div>
                    Indy
                    <span class="check">✓</span>
                </div>
                <div class="picker-option" data-value="other">
                    <div class="option-dot" style="background:var(--other)"></div>
                    Other
                    <span class="check">✓</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const DEFAULT_ENTRIES = [
            { id: '1', name: 'Nuria Trull', date: '2003-10-01', type: 'birthday', group: 'family' },
            { id: '2', name: 'Jordi Trull', date: '1969-10-04', type: 'birthday', group: 'family' },
            { id: '3', name: 'Sandra Duran', date: '1972-10-12', type: 'birthday', group: 'family' },
            { id: '4', name: 'Sergi Trull', date: '2005-10-24', type: 'birthday', group: 'family' },
            { id: '5', name: 'Marc Trull', date: '2005-10-24', type: 'birthday', group: 'family' },
            { id: '6', name: 'Lucas Jp', date: '2003-06-21', type: 'birthday', group: 'school' },
            { id: '7', name: 'Nuria', date: '0000-09-08', type: 'sant', group: 'other' },
            { id: '8', name: 'Marco Cosseddu', date: '2002-12-31', type: 'birthday', group: 'lux' },
            { id: '9', name: 'Charlotte Beghin', date: '2001-05-05', type: 'birthday', group: 'lux' },
            { id: '10', name: 'Rachele Barcaro', date: '2002-11-30', type: 'birthday', group: 'lux' },
            { id: '11', name: 'Lucia Cursellas', date: '2003-08-01', type: 'birthday', group: 'school' },
            { id: '12', name: 'Oscar Gran', date: '1967-11-06', type: 'birthday', group: 'family' },
            { id: '13', name: 'Alex Duran', date: '1969-02-26', type: 'birthday', group: 'family' },
            { id: '14', name: 'Aina Dominguez', date: '2003-11-22', type: 'birthday', group: 'school' },
            { id: '15', name: 'Roser Nogues', date: '1939-03-04', type: 'birthday', group: 'family' },
            { id: '16', name: 'Roser', date: '0000-10-07', type: 'sant', group: 'other' },
            { id: '17', name: 'Jordi', date: '0000-04-23', type: 'sant', group: 'other' },
            { id: '18', name: 'Oscar Iaio', date: '1938-02-14', type: 'birthday', group: 'family' },
            { id: '19', name: 'Hugo Nadal', date: '2003-11-12', type: 'birthday', group: 'school' },
            { id: '20', name: 'Anna Duran', date: '1982-04-08', type: 'birthday', group: 'family' },
            { id: '21', name: 'Sandra', date: '0000-06-05', type: 'sant', group: 'other' },
            { id: '22', name: 'Marc', date: '0000-04-25', type: 'sant', group: 'other' },
            { id: '23', name: 'Sergi', date: '0000-02-24', type: 'sant', group: 'other' },
            { id: '24', name: 'Laia Duran', date: '2020-04-07', type: 'birthday', group: 'family' },
            { id: '25', name: 'Anna', date: '0000-07-26', type: 'sant', group: 'other' },
            { id: '26', name: 'Alex', date: '0000-05-03', type: 'sant', group: 'other' },
            { id: '27', name: 'Oscar', date: '0000-02-03', type: 'sant', group: 'other' },
            { id: '28', name: 'Pol Duran', date: '2023-05-12', type: 'birthday', group: 'family' },
            { id: '29', name: 'Julia Duran', date: '2023-05-12', type: 'birthday', group: 'family' },
        ];

        localStorage.removeItem('birthday-friends');
        let friends = DEFAULT_ENTRIES.map(e => ({...e}));
        localStorage.setItem('birthday-friends', JSON.stringify(friends));
        let currentMonth = new Date().getMonth();
        const currentYear = 2026;
        let editingId = null;
        let selectedType = 'birthday';
        let selectedGroup = 'other';
        let viewingDay = null;

        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
            'July', 'August', 'September', 'October', 'November', 'December'];

        const groupColors = { family: 'var(--family)', uni: 'var(--uni)', school: 'var(--school)', lux: 'var(--lux)', indy: 'var(--indy)', other: 'var(--other)' };
        const groupNames = { family: 'Family', uni: 'Uni', school: 'School', lux: 'Lux', indy: 'Indy', other: 'Other' };

        function save() {
            localStorage.setItem('birthday-friends', JSON.stringify(friends));
        }

        function capitalizeName(name) {
            return name.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
        }

        function getInitials(name) {
            return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
        }

        function getAge(dateStr, month, day) {
            const birthDate = new Date(dateStr + 'T00:00:00');
            const birthYear = birthDate.getFullYear();
            let ageYear = currentYear;
            if (currentMonth < month - 1 || (currentMonth === month - 1 && day > new Date().getDate())) {
                ageYear = currentYear;
            }
            return ageYear - birthYear;
        }


        // Type selector in modal
        document.querySelectorAll('.type-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.type-option').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                selectedType = opt.dataset.value;
                const yearField = document.getElementById('input-year');
                const groupRow = document.getElementById('group-row');
                if (selectedType === 'sant') {
                    yearField.value = '';
                    yearField.style.display = 'none';
                    document.getElementById('year-sep').style.display = 'none';
                    groupRow.style.display = 'none';
                } else {
                    yearField.style.display = '';
                    document.getElementById('year-sep').style.display = '';
                    groupRow.style.display = '';
                }
            });
        });

        // Date fields - auto advance with validation
        document.getElementById('input-day').addEventListener('input', (e) => {
            let val = e.target.value.replace(/\D/g, '');
            if (val.length === 2) {
                const num = parseInt(val);
                if (num > 31) val = '31';
                if (num < 1 && val.length === 2) val = '01';
                e.target.value = val;
                document.getElementById('input-month').focus();
            }
            e.target.value = val;
        });

        document.getElementById('input-month').addEventListener('input', (e) => {
            let val = e.target.value.replace(/\D/g, '');
            if (val.length === 2) {
                const num = parseInt(val);
                if (num > 12) val = '12';
                if (num < 1 && val.length === 2) val = '01';
                e.target.value = val;
                document.getElementById('input-year').focus();
            }
            e.target.value = val;
        });

        document.getElementById('input-year').addEventListener('input', (e) => {
            let val = e.target.value.replace(/\D/g, '');
            if (val.length === 4) {
                const num = parseInt(val);
                const thisYear = new Date().getFullYear();
                if (num > thisYear) val = String(thisYear);
                e.target.value = val;
            }
            e.target.value = val;
        });

        function getDateValue() {
            const dd = document.getElementById('input-day').value.padStart(2, '0');
            const mm = document.getElementById('input-month').value.padStart(2, '0');
            if (selectedType === 'sant') {
                if (dd && mm && dd !== '00' && mm !== '00') {
                    return `0000-${mm}-${dd}`;
                }
                return '';
            }
            const yyyy = document.getElementById('input-year').value;
            if (dd && mm && yyyy && yyyy.length === 4) {
                return `${yyyy}-${mm}-${dd}`;
            }
            return '';
        }

        function setDateFields(dateStr) {
            if (dateStr) {
                const parts = dateStr.split('-');
                document.getElementById('input-day').value = parts[2];
                document.getElementById('input-month').value = parts[1];
                document.getElementById('input-year').value = parts[0] === '0000' ? '' : parts[0];
            } else {
                document.getElementById('input-day').value = '';
                document.getElementById('input-month').value = '';
                document.getElementById('input-year').value = '';
            }
        }

        // Group picker
        document.getElementById('group-display').addEventListener('click', () => {
            document.querySelectorAll('.picker-option').forEach(o => {
                o.classList.toggle('selected', o.dataset.value === selectedGroup);
            });
            document.getElementById('picker-overlay').classList.add('active');
        });

        document.querySelectorAll('.picker-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.picker-option').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                selectedGroup = opt.dataset.value;
                document.getElementById('group-text').textContent = groupNames[selectedGroup];
                document.getElementById('group-dot').style.background = groupColors[selectedGroup];
                document.getElementById('picker-overlay').classList.remove('active');
            });
        });

        document.getElementById('picker-overlay').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                document.getElementById('picker-overlay').classList.remove('active');
            }
        });

        // Calendar
        function renderCalendar() {
            document.getElementById('month-year').textContent = `${monthNames[currentMonth]} ${currentYear}`;

            const firstDay = new Date(currentYear, currentMonth, 1);
            const lastDay = new Date(currentYear, currentMonth + 1, 0);
            let startDay = firstDay.getDay() - 1;
            if (startDay < 0) startDay = 6;

            const today = new Date();
            const container = document.getElementById('calendar-days');
            container.innerHTML = '';

            for (let i = 0; i < startDay; i++) {
                container.innerHTML += '<div class="calendar-day other-month"></div>';
            }

            for (let day = 1; day <= lastDay.getDate(); day++) {
                const isToday = day === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear();
                const eventsOnDay = friends.filter(f => {
                    const d = new Date(f.date + 'T00:00:00');
                    return d.getDate() === day && d.getMonth() === currentMonth;
                });

                let classes = 'calendar-day';
                if (isToday) classes += ' today';

                let inner = `<span class="day-number">${day}</span>`;

                if (eventsOnDay.length > 0) {
                    inner += '<div class="avatars-stack">';
                    const show = eventsOnDay.slice(0, 3);
                    show.forEach(f => {
                        inner += `<div class="mini-avatar" style="background:var(--${f.group})">${getInitials(f.name)}</div>`;
                    });
                    inner += '</div>';
                }

                container.innerHTML += `<div class="${classes}" data-day="${day}">${inner}</div>`;
            }

            document.querySelectorAll('.calendar-day[data-day]').forEach(el => {
                el.addEventListener('click', () => {
                    document.querySelectorAll('.calendar-day').forEach(d => d.classList.remove('selected'));
                    el.classList.add('selected');
                    const day = parseInt(el.dataset.day);
                    viewingDay = day;
                    const eventsOnDay = friends.filter(f => {
                        const d = new Date(f.date + 'T00:00:00');
                        return d.getDate() === day && d.getMonth() === currentMonth;
                    });
                    showDayEntries(day, eventsOnDay);
                });
            });
        }

        // Day entries below calendar
        function showDayEntries(day, events) {
            const container = document.getElementById('day-entries');
            let html = `<div class="day-entries-title">${day} ${monthNames[currentMonth]}</div>`;

            if (events.length === 0) {
                html += '<p class="day-entries-empty">No events this day</p>';
            } else {
                html += events.map(f => {
                    const typeLabel = f.type === 'sant' ? 'Sant' : 'Birthday';
                    let ageHtml = '';
                    if (f.type === 'birthday') {
                        const birthYear = new Date(f.date + 'T00:00:00').getFullYear();
                        const turningAge = currentYear - birthYear;
                        if (turningAge > 0 && turningAge < 120) {
                            ageHtml = `<span class="age-badge">Turning ${turningAge}</span>`;
                        }
                    }
                    return `
                        <div class="day-entry-card" onclick="editFriend('${f.id}')">
                            <div class="avatar" style="background:var(--${f.group})">${getInitials(f.name)}</div>
                            <div class="info">
                                <div class="name">${f.name}</div>
                                <div class="detail">${formatFullDate(f.date)} · ${typeLabel}</div>
                            </div>
                            ${ageHtml}
                        </div>
                    `;
                }).join('');
            }

            container.innerHTML = html;
        }

        // Day detail
        function getOrdinal(n) {
            if (n > 3 && n < 21) return n + 'th';
            switch (n % 10) {
                case 1: return n + 'st';
                case 2: return n + 'nd';
                case 3: return n + 'rd';
                default: return n + 'th';
            }
        }

        function formatFullDate(dateStr) {
            const parts = dateStr.split('-');
            const day = parseInt(parts[2]);
            const month = parseInt(parts[1]) - 1;
            const year = parseInt(parts[0]);
            if (year === 0) {
                return `${getOrdinal(day)} of ${monthNames[month]}`;
            }
            return `${getOrdinal(day)} of ${monthNames[month]} ${year}`;
        }


        // All events
        let allEventsFilter = 'all';

        function renderAllEvents() {
            const list = document.getElementById('all-events-list');
            const searchTerm = (document.getElementById('all-events-search-input').value || '').toLowerCase().trim();
            let filtered = allEventsFilter === 'all' ? friends : friends.filter(f => f.group === allEventsFilter);
            if (searchTerm) {
                filtered = filtered.filter(f => f.name.toLowerCase().includes(searchTerm));
            }

            if (filtered.length === 0) {
                list.innerHTML = '<p style="text-align:center; color:#8e8e93; font-size:0.85rem; padding:40px 0;">No events</p>';
                return;
            }

            const groups = ['family', 'uni', 'school', 'lux', 'indy', 'other'];
            let html = '';

            if (allEventsFilter === 'all') {
                groups.forEach(group => {
                    const groupFriends = filtered.filter(f => f.group === group).sort((a, b) => a.name.localeCompare(b.name));
                    if (groupFriends.length === 0) return;

                    html += `<div class="all-events-group-title"><div class="dot" style="background:var(--${group})"></div>${groupNames[group]}</div>`;
                    html += renderAllEventsCards(groupFriends);
                });
            } else {
                const sorted = filtered.sort((a, b) => a.name.localeCompare(b.name));
                html += renderAllEventsCards(sorted);
            }

            list.innerHTML = html;
        }

        function renderAllEventsCards(list) {
            return list.map(f => {
                const typeLabel = f.type === 'sant' ? 'Sant' : 'Birthday';
                return `
                    <div class="all-events-card" onclick="document.getElementById('all-events-overlay').classList.remove('active'); editFriend('${f.id}')">
                        <div class="avatar" style="background:var(--${f.group})">${getInitials(f.name)}</div>
                        <div class="info">
                            <div class="name">${f.name}</div>
                            <div class="detail">${formatFullDate(f.date)} · ${typeLabel}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        document.getElementById('open-all-events').addEventListener('click', () => {
            renderAllEvents();
            document.getElementById('all-events-overlay').classList.add('active');
        });

        document.getElementById('open-all-events-year').addEventListener('click', () => {
            renderAllEvents();
            document.getElementById('all-events-overlay').classList.add('active');
        });

        document.querySelectorAll('#all-events-filter .filter-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('#all-events-filter .filter-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                allEventsFilter = chip.dataset.group;
                renderAllEvents();
            });
        });

        document.getElementById('all-events-search-input').addEventListener('input', (e) => {
            renderAllEvents();
        });

        document.getElementById('all-events-close').addEventListener('click', () => {
            document.getElementById('all-events-overlay').classList.remove('active');
        });

        // Modal
        function openModal(friend = null, prefillDay = null, prefillMonth = null) {
            editingId = friend ? friend.id : null;
            document.getElementById('modal-title').textContent = friend ? 'Edit' : 'New Event';
            document.getElementById('input-name').value = friend ? friend.name : '';
            if (friend) {
                setDateFields(friend.date);
            } else if (prefillDay && prefillMonth) {
                document.getElementById('input-day').value = String(prefillDay).padStart(2, '0');
                document.getElementById('input-month').value = String(prefillMonth).padStart(2, '0');
                document.getElementById('input-year').value = '';
            } else {
                setDateFields('');
            }

            document.getElementById('delete-section').style.display = friend ? 'block' : 'none';

            selectedType = friend ? friend.type : 'birthday';
            document.querySelectorAll('.type-option').forEach(o => {
                o.classList.toggle('selected', o.dataset.value === selectedType);
            });
            const yearField = document.getElementById('input-year');
            const yearSep = document.getElementById('year-sep');
            const groupRow = document.getElementById('group-row');
            if (selectedType === 'sant') {
                yearField.style.display = 'none';
                yearSep.style.display = 'none';
                groupRow.style.display = 'none';
            } else {
                yearField.style.display = '';
                yearSep.style.display = '';
                groupRow.style.display = '';
            }

            selectedGroup = friend ? friend.group : 'family';
            document.getElementById('group-text').textContent = groupNames[selectedGroup];
            document.getElementById('group-dot').style.background = groupColors[selectedGroup];

            document.getElementById('modal-overlay').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('active');
            editingId = null;
        }

        function editFriend(id) {
            const friend = friends.find(f => f.id === id);
            if (friend) openModal(friend);
        }

        document.getElementById('fab-add').addEventListener('click', () => {
            if (viewingDay) {
                openModal(null, viewingDay, currentMonth + 1);
            } else {
                openModal();
            }
        });
        document.getElementById('btn-cancel').addEventListener('click', closeModal);
        document.getElementById('modal-overlay').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeModal();
        });

        document.getElementById('btn-save').addEventListener('click', () => {
            const rawName = document.getElementById('input-name').value.trim();
            const date = getDateValue();
            const type = selectedType;
            const group = selectedGroup;

            let valid = true;
            const nameInput = document.getElementById('input-name');
            const dayInput = document.getElementById('input-day');
            const monthInput = document.getElementById('input-month');
            const yearInput = document.getElementById('input-year');

            nameInput.style.border = '';
            dayInput.style.color = '';
            monthInput.style.color = '';
            yearInput.style.color = '';

            if (!rawName) {
                nameInput.style.border = '1px solid #ff3b30';
                nameInput.style.borderRadius = '6px';
                valid = false;
            }
            if (!date) {
                dayInput.style.color = '#ff3b30';
                monthInput.style.color = '#ff3b30';
                yearInput.style.color = '#ff3b30';
                valid = false;
            }

            if (!valid) return;

            const name = capitalizeName(rawName);

            if (editingId) {
                const idx = friends.findIndex(f => f.id === editingId);
                if (idx >= 0) friends[idx] = { ...friends[idx], name, date, type, group };
            } else {
                friends.push({ id: Date.now().toString(), name, date, type, group });
            }

            save();
            closeModal();
            renderCalendar();
        });

        document.getElementById('btn-delete').addEventListener('click', () => {
            if (editingId) {
                friends = friends.filter(f => f.id !== editingId);
                save();
                closeModal();
                renderCalendar();
            }
        });

        // Coming up
        function getDaysUntil(month, day) {
            const today = new Date();
            const todayStart = new Date(today.getFullYear(), today.getMonth(), today.getDate());
            let next = new Date(today.getFullYear(), month - 1, day);
            if (next < todayStart) {
                next = new Date(today.getFullYear() + 1, month - 1, day);
            }
            return Math.round((next - todayStart) / (1000 * 60 * 60 * 24));
        }

        function renderComingUp() {
            const section = document.getElementById('coming-up-section');
            if (friends.length === 0) {
                section.innerHTML = '';
                return;
            }

            const sorted = [...friends].map(f => {
                const d = new Date(f.date + 'T00:00:00');
                const daysLeft = getDaysUntil(d.getMonth() + 1, d.getDate());
                return { ...f, daysLeft };
            }).sort((a, b) => a.daysLeft - b.daysLeft).slice(0, 5);

            let html = '<div class="coming-up-title">Coming up</div>';
            html += sorted.map(f => {
                const typeLabel = f.type === 'sant' ? 'Sant' : 'Birthday';
                const d = new Date(f.date + 'T00:00:00');
                let daysText = f.daysLeft === 0 ? 'Today' : f.daysLeft + 'd';
                return `
                    <div class="coming-up-card">
                        <div class="avatar" style="background:var(--${f.group})">${getInitials(f.name)}</div>
                        <div class="info">
                            <div class="name">${f.name}</div>
                            <div class="detail">${formatFullDate(f.date)} · ${typeLabel}</div>
                        </div>
                        <span class="days-left">${daysText}</span>
                    </div>
                `;
            }).join('');

            section.innerHTML = html;
        }

        // Year view
        function renderYearView() {
            const grid = document.getElementById('months-grid');
            const today = new Date();
            grid.innerHTML = monthNames.map((name, i) => {
                const isCurrent = i === today.getMonth() && currentYear === today.getFullYear();
                let classes = 'month-card';
                if (isCurrent) classes += ' current';
                return `
                    <div class="${classes}" data-month="${i}">
                        <div class="month-name">${name.slice(0, 3)}</div>
                    </div>
                `;
            }).join('');

            grid.querySelectorAll('.month-card').forEach(card => {
                card.addEventListener('click', () => {
                    currentMonth = parseInt(card.dataset.month);
                    renderCalendar();
                    document.getElementById('calendar-view').classList.add('active');
                    document.getElementById('fab-add').classList.add('visible');
                });
            });
        }

        document.getElementById('back-to-year').addEventListener('click', () => {
            document.getElementById('calendar-view').classList.remove('active');
            document.getElementById('fab-add').classList.remove('visible');
            viewingDay = null;
            renderYearView();
            renderComingUp();
        });

        document.getElementById('prev-month').addEventListener('click', () => {
            if (currentMonth > 0) {
                currentMonth--;
                viewingDay = null;
                document.getElementById('day-entries').innerHTML = '';
                renderCalendar();
            }
        });

        document.getElementById('next-month').addEventListener('click', () => {
            if (currentMonth < 11) {
                currentMonth++;
                viewingDay = null;
                document.getElementById('day-entries').innerHTML = '';
                renderCalendar();
            }
        });

        renderYearView();
        renderComingUp();
    </script>
</body>
</html>
